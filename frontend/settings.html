<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Quiz</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="theme-init.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="api.js"></script>
  <script src="nav.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/toast.jsx"></script>
  <script type="text/babel" src="components/sidebar.jsx"></script>
  <script type="text/babel" src="components/footer.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screens/settings.jsx"></script>

  <script type="text/babel">
    function SettingsHost() {
      // Theme is owned by PageShell tweaks; we route Settings' theme controls into it.
      const [, setTweak] = useTweaks({ theme: 'light' });
      const [theme, setTheme] = React.useState(
        document.documentElement.getAttribute('data-theme') || 'light'
      );
      // Keep local in sync with html attr (PageShell applies it after mount)
      React.useEffect(() => {
        const obs = new MutationObserver(() => {
          setTheme(document.documentElement.getAttribute('data-theme') || 'light');
        });
        obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        return () => obs.disconnect();
      }, []);

      const handleLogout = async () => {
        try { await window.API.post('/auth/logout/'); } catch {}
        window.API.clearUser();
        window.navigate('landing');
      };

      return (
        <AppPage current="settings" theme={theme} onTheme={(v) => { setTweak('theme', v); setTheme(v); }}>
          <Settings
            theme={theme}
            onTheme={(v) => { setTweak('theme', v); setTheme(v); }}
            onLogout={handleLogout}
          />
        </AppPage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SettingsHost />);
  </script>
</body>
</html>
